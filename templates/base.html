{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mon site de sondages{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'polls/css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 mb-0">
    <a class="navbar-brand" href="{% url 'polls:index' %}">Sondages</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button class="btn btn-outline-light btn-sm" type="submit">Déconnexion</button>
            </form>
        {% else %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Connexion</a>
        {% endif %}
    </div>
</nav>

{% block header %}{% endblock %}

<main class="container mt-4 mb-5">
    {% block main %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
