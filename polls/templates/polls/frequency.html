{% extends 'base.html' %}

{% block title %}Fréquences — {{ question.question_text }}{% endblock %}

{% block main %}
<h1>{{ question.question_text }}</h1>
<ul>
{% for choice in choices %}
    <li>{{ choice.0 }} — {{ choice.1 }} vote(s) ({{ choice.2 }}%)</li>
{% endfor %}
</ul>
<a href="{% url 'polls:all' %}">Retour au menu</a>
{% endblock %}
