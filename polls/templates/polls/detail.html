{% extends 'base.html' %}
{% block title %}{{ question.question_text }}{% endblock %}
{% block main %}
    <div class="card" style="width:560px; border-radius:16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);">
        <div class="card-header text-center py-3">
            <h5 class="mb-0">{{ question.question_text }}</h5>
        </div>
        <div class="card-body px-4 py-4">
            {% if error_message %}
                <div class="alert alert-danger">{{ error_message }}</div>
            {% endif %}
            <form action="{% url 'polls:vote' question.id %}" method="post">
                {% csrf_token %}
                {% for choice in question.choice_set.all %}
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio"
                           name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                    <label class="form-check-label fs-5" for="choice{{ forloop.counter }}">
                        {{ choice.choice_text }}
                    </label>
                </div>
                {% endfor %}
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'polls:index' %}" class="btn btn-outline-danger">Retour</a>
                    <button type="submit" class="btn btn-success px-4">Voter</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
